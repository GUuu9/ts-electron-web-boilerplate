<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>System Logs</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0f172a;
      color: #10b981;
      font-family: 'Fira Code', 'Courier New', Courier, monospace;
      font-size: 0.9rem;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    header {
      background: #1e293b;
      padding: 0.5rem 1rem;
      border-bottom: 1px solid #334155;
      font-size: 0.75rem;
      color: #94a3b8;
      font-weight: bold;
      display: flex;
      justify-content: space-between;
      flex-shrink: 0;
    }
    #log-container {
      flex: 1;
      padding: 1rem;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .log-entry { margin-bottom: 0.2rem; }
    .error { color: #ef4444; }

    /* Input Area */
    .input-area {
      padding: 0.75rem 1rem;
      background: #0f172a;
      border-top: 1px solid #334155;
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-shrink: 0;
    }
    .input-area::before {
      content: ">";
      color: #64748b;
    }
    input {
      flex: 1;
      background: transparent;
      border: none;
      color: #f8fafc;
      font-family: 'Fira Code', monospace;
      outline: none;
      font-size: 0.85rem;
    }
    button {
      background: #334155;
      color: #f8fafc;
      border: none;
      padding: 0.3rem 0.8rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.75rem;
      font-family: inherit;
    }
    button:hover { background: #475569; }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 4px; }
  </style>
</head>
<body>
  <header>
    <span>SYSTEM LOG STREAM</span>
    <span id="status">Connected</span>
  </header>
  <div id="log-container">> System logger initialized...</div>
  
  <div class="input-area">
    <input type="text" id="cmd-input" placeholder="Enter command to execute in main window...">
    <button id="exec-btn">Exec</button>
  </div>

  <script type="module">
    const container = document.getElementById('log-container');
    const status = document.getElementById('status');
    const input = document.getElementById('cmd-input');
    const btn = document.getElementById('exec-btn');

    function sendCmd() {
      const val = input.value.trim();
      if (!val) return;
      
      if (window.electronAPI && window.electronAPI.logger) {
        window.electronAPI.logger.sendCommand(val);
        input.value = '';
      }
    }

    btn.onclick = sendCmd;
    input.onkeypress = (e) => { if (e.key === 'Enter') sendCmd(); };

    if (window.electronAPI && window.electronAPI.logger) {
      window.electronAPI.logger.onReceive((data) => {
        const entry = document.createElement('div');
        entry.className = 'log-entry' + (data.isError ? ' error' : '');
        const time = new Date().toLocaleTimeString();
        entry.innerText = `[${time}] ${data.message}`;
        container.appendChild(entry);
        container.scrollTop = container.scrollHeight;
      });

      window.electronAPI.logger.onClosed(() => {
        status.innerText = 'Disconnected';
        status.style.color = '#ef4444';
      });
    }
  </script>
</body>
</html>
