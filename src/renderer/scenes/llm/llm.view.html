<div class="view-container llm-view">
  <!-- Sidebar -->
  <aside id="llm-sidebar" class="llm-sidebar">
    <div class="sidebar-content">
      <div class="sidebar-header">
        <span>Workspace</span>
        <button id="close-sidebar-btn" class="btn-icon">
          <i data-lucide="chevron-left"></i>
        </button>
      </div>

      <!-- 1. Session Management -->
      <section class="sidebar-group">
        <label class="sidebar-label">Conversations</label>
        <button id="new-chat-btn" class="btn btn-primary w-full">
          <i data-lucide="plus"></i> New Chat
        </button>
        <div id="chat-sessions-list" class="sidebar-session-list">
          <!-- Sessions will be rendered here -->
        </div>
      </section>

      <div class="sidebar-divider"></div>

      <!-- 2. Model Settings -->
      <section class="sidebar-group">
        <label class="sidebar-label">Model Settings</label>
        <div class="sidebar-card">
          <label>Active Model</label>
          <div class="sidebar-input-row">
            <select id="model-select-chat" class="sidebar-select">
              <option value="">Select model...</option>
            </select>
            <button id="run-model-btn" class="btn-icon" title="Run Model" style="color: var(--primary-color);">
              <i data-lucide="play"></i>
            </button>
            <button id="refresh-chat-models-btn" class="btn-icon" title="Refresh">
              <i data-lucide="refresh-cw"></i>
            </button>
          </div>
        </div>
        
        <div class="sidebar-card">
          <label>Context Length (n_ctx)</label>
          <div class="sidebar-input-row">
            <input type="number" id="context-length-input" class="sidebar-select" value="2048" step="1024" min="512" max="32768">
          </div>
        </div>
      </section>

      <div class="sidebar-divider"></div>

      <!-- 3. Agent Controls -->
      <section class="sidebar-group">
        <label class="sidebar-label">Agent Controls</label>
        <div class="sidebar-card">
          <label>Add Allowed Folder</label>
          <div class="sidebar-input-row">
            <input type="text" id="allowed-path-input" class="sidebar-select" placeholder="Absolute path...">
            <button id="add-path-btn" class="btn btn-primary" title="Allow">
              <i data-lucide="plus"></i>
            </button>
          </div>
        </div>
        <textarea id="system-prompt" class="sidebar-textarea" rows="3" placeholder="System Prompt..."></textarea>
      </section>

      <div class="sidebar-divider"></div>

      <!-- 4. Library & Utils -->
      <section class="sidebar-group">
        <label class="sidebar-label">Model Library</label>
        <div class="sidebar-input-row">
          <input type="text" id="pull-model-input" class="sidebar-select" placeholder="URL or keyword...">
          <button id="pull-model-btn" class="btn btn-primary" title="Download">
            <i data-lucide="download"></i>
          </button>
        </div>
        <div id="installed-models-list" class="sidebar-model-list"></div>
      </section>

      <div class="sidebar-divider"></div>

      <section class="sidebar-group">
        <div class="sidebar-actions-vertical">
          <button id="reset-context-btn" class="btn btn-outline btn-warning">
            <i data-lucide="refresh-ccw"></i> Reset Context
          </button>
          <button id="clear-chat-btn" class="btn btn-outline btn-danger">
            <i data-lucide="trash-2"></i> Clear History
          </button>
        </div>
      </section>
    </div>
  </aside>

  <!-- Main Area -->
  <main class="llm-main-area">
    <header class="llm-header">
      <button id="sidebar-toggle-btn" class="btn-icon">
        <i data-lucide="panel-left"></i>
      </button>
      <div class="active-model-display">
        <span id="active-model-name">Select a model</span>
        <span id="server-status-badge" class="status-indicator"></span>
      </div>
    </header>

    <div id="chat-history" class="gpt-chat-history">
      <div class="chat-welcome">
        <div class="welcome-icon"><i data-lucide="bot"></i></div>
        <h2>Local AI</h2>
        <p>모델을 설정한 뒤 대화를 시작하세요.</p>
      </div>
    </div>

    <!-- 에이전트 상태 바 -->
    <div id="agent-status-bar" class="agent-status-bar hidden"></div>

    <!-- 타이핑 인디케이터 -->
    <div id="typing-indicator" class="typing-indicator hidden">
      <div class="ai-avatar"><i data-lucide="bot"></i></div>
      <span id="loader-message" class="typing-label">AI is thinking...</span>
    </div>

    <footer class="gpt-input-bar">
      <div class="gpt-input-wrapper">
        <div class="gpt-textarea-container">
          <textarea id="prompt-input" class="gpt-textarea" placeholder="Ask anything..." rows="1"></textarea>
        </div>
        <div class="gpt-input-actions">
          <button id="abort-btn" class="btn-icon btn-danger hidden" title="Stop Generation">
            <i data-lucide="square"></i>
          </button>
          <button id="send-btn" class="btn btn-primary">
            <i data-lucide="send"></i>
          </button>
        </div>
      </div>
    </footer>
  </main>
</div>

<!-- 스크롤 버튼 -->
<div class="scroll-controls">
  <button id="scroll-top-btn" class="btn-icon" title="Top">
    <i data-lucide="chevron-up"></i>
  </button>
  <button id="scroll-bottom-btn" class="btn-icon" title="Bottom">
    <i data-lucide="chevron-down"></i>
  </button>
</div>

<!-- 다운로드 오버레이 -->
<div id="llm-loader" class="download-overlay hidden">
  <div class="download-card">
    <div class="download-spinner"></div>
    <span id="download-loader-message">Downloading model...</span>
  </div>
</div>
