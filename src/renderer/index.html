<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cross Platform App</title>
  <link rel="stylesheet" href="./styles/main.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div id="app">

    <!-- Detail View -->
    <div id="detail-view" style="display: none;">
      <header class="detail-header">
        <button class="btn btn-outline back-btn" id="nav-back" title="Back to Dashboard"><i data-lucide="arrow-left"></i></button>
      </header>
      <div id="test-content" class="network-view"></div>
    </div>

    <!-- Main Dashboard -->
    <div id="dashboard-view" class="grid">
      <div class="card" id="nav-http"><h3><i data-lucide="globe"></i> HTTP</h3><span class="badge">Universal</span></div>
      <div class="card" id="nav-socket"><h3><i data-lucide="zap"></i> Socket</h3><span class="badge">Universal</span></div>
      <div class="card" id="nav-tcp"><h3><i data-lucide="server"></i> TCP</h3><span class="badge">Desktop</span></div>
      <div class="card" id="nav-udp"><h3><i data-lucide="send"></i> UDP</h3><span class="badge">Desktop</span></div>
      <div class="card" id="nav-os"><h3><i data-lucide="monitor"></i> OS</h3><span class="badge">Desktop</span></div>
      <div class="card" id="nav-system"><h3><i data-lucide="cpu"></i> System</h3><span class="badge">Desktop</span></div>
      <div class="card" id="nav-persistence"><h3><i data-lucide="database"></i> Persistence</h3><span class="badge">Desktop</span></div>
      <div class="card" id="nav-security"><h3><i data-lucide="shield-check"></i> Security</h3><span class="badge">Desktop</span></div>
      <div class="card" id="nav-serial"><h3><i data-lucide="radio"></i> Serial</h3><span class="badge">Desktop</span></div>
      <div class="card" id="nav-media"><h3><i data-lucide="settings-2"></i> Device</h3><span class="badge">Desktop</span></div>
      <div class="card" id="nav-file"><h3><i data-lucide="file-text"></i> File</h3><span class="badge">Desktop</span></div>
      <div class="card" id="nav-logger"><h3><i data-lucide="terminal"></i> Logger</h3><span class="badge">Desktop</span></div>
      <div class="card" id="nav-macro"><h3><i data-lucide="bot"></i> Macro</h3><span class="badge">Universal</span></div>
      <div class="card" id="nav-vision"><h3><i data-lucide="eye"></i> Vision</h3><span class="badge">Desktop</span></div>
      <div class="card" id="nav-ai"><h3><i data-lucide="brain"></i> AI</h3><span class="badge">Universal</span></div>
      <div class="card" id="nav-llm"><h3><i data-lucide="message-square"></i> LLM</h3><span class="badge">Local AI</span></div>
    </div>
  </div>
  

  <script type="module" src="./main.ts"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();
    });
  </script>
</body>
</html>
